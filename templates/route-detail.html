<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="/js/theme-init.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Route Details - Ride Optimizer</title>
    <link rel="icon" type="image/svg+xml" href="/img/favicon.svg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
    <link rel="stylesheet" href="/css/main.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="/css/pages/route-detail.css">
</head>
<body>
    <!-- Skip Links for Accessibility -->
    <a href="#main-content" class="skip-link">Skip to main content</a>

    {% include "partials/nav.html" %}

    <main id="main-content" class="container mt-4" role="main">
        <div class="row mb-3">
            <div class="col-12">
                <a href="/routes.html" class="btn btn-outline-secondary">
                    <i class="bi bi-arrow-left" aria-hidden="true"></i> Back to Routes
                </a>
            </div>
        </div>

        <div id="route-detail-live-region" class="visually-hidden" aria-live="polite" aria-atomic="true"></div>

        <div id="route-details">
            <h1 class="mb-3">Route Details</h1>
            <div class="text-center py-5">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading route details...</span>
                </div>
                <p class="mt-3 text-muted">Loading route details...</p>
            </div>
        </div>
    </main>

    {% include "partials/bottom_nav.html" %}

    <footer class="mt-3">
        <div class="container text-center text-muted">
            <small>Ride Optimizer v0.17.0 - Smart Static Architecture</small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script src="/js/common.js"></script>
    <script src="/js/help-modal.js"></script>
    <script src="/js/api-client.js"></script>
    <script src="/js/route-detail.js"></script>
    <script src="/js/mobile.js"></script>
</body>
</html>
