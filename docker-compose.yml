services:
  ride-optimizer:
    image: ghcr.io/e2kd7n/ride-optimizer:latest
    container_name: ride-optimizer
    restart: unless-stopped

    env_file:
      - .env

    environment:
      - APP_PORT=${APP_PORT:-8083}

    ports:
      - "${APP_PORT:-8083}:${APP_PORT:-8083}"

    volumes:
      - ./data:/app/data
      - ./cache:/app/cache
      - ./logs:/app/logs
      - ./config:/app/config

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${APP_PORT:-8083}/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

    mem_limit: 512m
    cpus: "1.5"
