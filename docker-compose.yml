services:
  ride-optimizer:
    image: ghcr.io/e2kd7n/ride-optimizer:latest
    container_name: ride-optimizer
    restart: unless-stopped

    env_file:
      - .env

    environment:
      - APP_PORT=${APP_PORT:-8083}
      # Required: gunicorn now defaults to 127.0.0.1 (see gunicorn.conf.py) to avoid
      # binding all host interfaces for bare/dev runs. Inside this container that
      # default would break the "ports:" publish below, since podman/docker routes
      # host traffic to the container's bridge interface, not its loopback — so the
      # container must explicitly opt back into 0.0.0.0. LAN exposure is actually
      # controlled by the "ports:" mapping below, not this value.
      - BIND_HOST=0.0.0.0
      - NTFY_ENABLED=${NTFY_ENABLED:-false}
      - NTFY_SERVER=${NTFY_SERVER:-https://ntfy.sh}
      - NTFY_TOPIC=${NTFY_TOPIC:-ride-optimizer}
      - NTFY_PRIORITY_CRITICAL=${NTFY_PRIORITY_CRITICAL:-urgent}
      - NTFY_PRIORITY_WARNING=${NTFY_PRIORITY_WARNING:-default}
      - NTFY_PRIORITY_INFO=${NTFY_PRIORITY_INFO:-low}

    ports:
      - "${APP_PORT:-8083}:${APP_PORT:-8083}"

    volumes:
      - ./data:/app/data
      - ./cache:/app/cache
      - ./logs:/app/logs
      - ./config:/app/config

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${APP_PORT:-8083}/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 180s

    mem_limit: 512m
    cpus: "1.5"
