services:
  ride-optimizer:
    image: ride-optimizer:latest
    container_name: ride-optimizer
    restart: unless-stopped

    env_file:
      - .env

    environment:
      - APP_PORT=${APP_PORT:-8083}
      - NTFY_ENABLED=${NTFY_ENABLED:-false}
      - NTFY_SERVER=${NTFY_SERVER:-https://ntfy.sh}
      - NTFY_TOPIC=${NTFY_TOPIC:-ride-optimizer}
      - NTFY_PRIORITY_CRITICAL=${NTFY_PRIORITY_CRITICAL:-urgent}
      - NTFY_PRIORITY_WARNING=${NTFY_PRIORITY_WARNING:-default}
      - NTFY_PRIORITY_INFO=${NTFY_PRIORITY_INFO:-low}

    ports:
      - "${APP_PORT:-8083}:${APP_PORT:-8083}"

    volumes:
      - ./data:/app/data
      - ./cache:/app/cache
      - ./logs:/app/logs
      - ./config:/app/config

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${APP_PORT:-8083}/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 180s

    mem_limit: 512m
    cpus: "1.5"
