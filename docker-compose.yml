version: '3.8'

services:
  ride-optimizer:
    build:
      context: .
      dockerfile: Dockerfile
    image: ride-optimizer:latest
    container_name: ride-optimizer
    restart: unless-stopped
    
    # Environment variables
    env_file:
      - .env
    
    # Volumes for persistent data
    volumes:
      - ./data:/app/data
      - ./cache:/app/cache
      - ./logs:/app/logs
      - ./config:/app/config
    
    # Port mapping (if using Flask API)
    ports:
      - "5000:5000"
    
    # Resource limits for Raspberry Pi
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M
    
    # Interactive mode for menu system
    stdin_open: true
    tty: true
    
    # Network mode - host mode avoids slirp4netns issues on Raspberry Pi
    # Use 'host' for better compatibility with rootless Podman on ARM
    network_mode: host
    
    # Health check
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

