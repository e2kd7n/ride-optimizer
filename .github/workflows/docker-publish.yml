name: Build and Push Container Image

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'src/**'
      - 'static/**'
      - 'config/**'
      - 'cron/**'
      - 'launch.py'
      - 'wsgi.py'
      - 'gunicorn.conf.py'
      - 'requirements.txt'
      - 'Dockerfile'
      - '.github/workflows/docker-publish.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        env:
          STRAVA_CLIENT_ID: ci-placeholder
          STRAVA_CLIENT_SECRET: ci-placeholder
        run: |
          python -m pytest tests/ -q --tb=short \
            --ignore=tests/test_api.py \
            --ignore=tests/test_api_integration.py \
            --ignore=tests/test_e2e_workflow.py \
            --ignore=tests/test_routes_api.py \
            --ignore=tests/test_routes_commute.py \
            --ignore=tests/test_routes_dashboard.py \
            --ignore=tests/test_routes_route_library.py \
            --ignore=tests/test_routes_planner.py \
            --ignore=tests/test_map_advanced_features.py \
            --ignore=tests/test_analysis_service.py \
            --ignore=tests/test_integration.py \
            --ignore=tests/test_route_library_service.py \
            --ignore=tests/test_commute_service.py \
            --ignore=tests/uat \
            --ignore=tests/qa \
            --ignore=tests/e2e

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (for ARM cross-compilation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
