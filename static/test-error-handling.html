<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error Handling Test</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</head>
<body>
    <div class="container mt-5">
        <h1 class="mb-4">Error Handling Tests</h1>
        
        <div class="card mb-3">
            <div class="card-header">
                <h5>Test 1: 404 Error (Non-existent endpoint)</h5>
            </div>
            <div class="card-body">
                <button class="btn btn-primary" onclick="test404()">Test 404 Error</button>
                <div id="result-404" class="mt-3"></div>
            </div>
        </div>
        
        <div class="card mb-3">
            <div class="card-header">
                <h5>Test 2: Network Error (Invalid URL)</h5>
            </div>
            <div class="card-body">
                <button class="btn btn-primary" onclick="testNetworkError()">Test Network Error</button>
                <div id="result-network" class="mt-3"></div>
            </div>
        </div>
        
        <div class="card mb-3">
            <div class="card-header">
                <h5>Test 3: Timeout (Slow endpoint)</h5>
            </div>
            <div class="card-body">
                <button class="btn btn-primary" onclick="testTimeout()">Test Timeout</button>
                <div id="result-timeout" class="mt-3"></div>
            </div>
        </div>
        
        <div class="card mb-3">
            <div class="card-header">
                <h5>Test 4: Successful Request</h5>
            </div>
            <div class="card-body">
                <button class="btn btn-success" onclick="testSuccess()">Test Success</button>
                <div id="result-success" class="mt-3"></div>
            </div>
        </div>
        
        <div class="card mb-3">
            <div class="card-header">
                <h5>Test 5: Retry Logic</h5>
            </div>
            <div class="card-body">
                <button class="btn btn-warning" onclick="testRetry()">Test Retry (watch console)</button>
                <div id="result-retry" class="mt-3"></div>
            </div>
        </div>
    </div>
    
    <script src="/js/api-client.js"></script>
    <script>
        async function test404() {
            const result = document.getElementById('result-404');
            result.innerHTML = '<div class="spinner-border" role="status"></div>';
            
            try {
                await window.apiClient.fetch('/nonexistent');
                result.innerHTML = '<div class="alert alert-danger">Test failed - should have thrown error</div>';
            } catch (error) {
                result.innerHTML = `
                    <div class="alert alert-success">
                        <strong>✓ Test Passed</strong><br>
                        Error message: ${error.message}<br>
                        Status: ${error.status || 'N/A'}
                    </div>
                `;
            }
        }
        
        async function testNetworkError() {
            const result = document.getElementById('result-network');
            result.innerHTML = '<div class="spinner-border" role="status"></div>';
            
            // Create a temporary client with invalid base URL
            const badClient = new APIClient('http://invalid-domain-that-does-not-exist.com/api');
            
            try {
                await badClient.fetch('/status');
                result.innerHTML = '<div class="alert alert-danger">Test failed - should have thrown error</div>';
            } catch (error) {
                result.innerHTML = `
                    <div class="alert alert-success">
                        <strong>✓ Test Passed</strong><br>
                        Error message: ${error.message}<br>
                        Error type: ${error.name}
                    </div>
                `;
            }
        }
        
        async function testTimeout() {
            const result = document.getElementById('result-timeout');
            result.innerHTML = '<div class="spinner-border" role="status"></div>';
            
            // Create a client with very short timeout
            const timeoutClient = new APIClient('/api');
            timeoutClient.timeout = 100; // 100ms timeout
            
            try {
                await timeoutClient.fetch('/status');
                result.innerHTML = `
                    <div class="alert alert-success">
                        <strong>✓ Request completed within timeout</strong><br>
                        (Server responded quickly)
                    </div>
                `;
            } catch (error) {
                result.innerHTML = `
                    <div class="alert alert-success">
                        <strong>✓ Test Passed (Timeout detected)</strong><br>
                        Error message: ${error.message}<br>
                        Error type: ${error.name}
                    </div>
                `;
            }
        }
        
        async function testSuccess() {
            const result = document.getElementById('result-success');
            result.innerHTML = '<div class="spinner-border" role="status"></div>';
            
            try {
                const data = await window.apiClient.fetch('/status');
                result.innerHTML = `
                    <div class="alert alert-success">
                        <strong>✓ Test Passed</strong><br>
                        Status: ${data.status}<br>
                        Services: ${Object.keys(data.services || {}).length} initialized
                    </div>
                `;
            } catch (error) {
                result.innerHTML = `
                    <div class="alert alert-danger">
                        <strong>✗ Test Failed</strong><br>
                        Error: ${error.message}
                    </div>
                `;
            }
        }
        
        async function testRetry() {
            const result = document.getElementById('result-retry');
            result.innerHTML = '<div class="spinner-border" role="status"></div><p class="mt-2">Check browser console for retry logs...</p>';
            
            console.log('=== Starting Retry Test ===');
            console.log('This will attempt to fetch a non-existent endpoint 3 times with exponential backoff');
            
            try {
                await window.apiClient.fetch('/nonexistent');
                result.innerHTML = '<div class="alert alert-danger">Test failed - should have thrown error</div>';
            } catch (error) {
                result.innerHTML = `
                    <div class="alert alert-success">
                        <strong>✓ Test Passed</strong><br>
                        Retry logic executed (check console for 3 attempts)<br>
                        Final error: ${error.message}
                    </div>
                `;
            }
            
            console.log('=== Retry Test Complete ===');
        }
    </script>
</body>
</html>
