<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error Handling Test</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</head>
<body>
    <div class="container mt-5">
        <h1 class="mb-4">Error Handling Tests</h1>
        
        <div class="card mb-3">
            <div class="card-header">
                <h5>Test 1: 404 Error (Non-existent endpoint)</h5>
            </div>
            <div class="card-body">
                <button class="btn btn-primary" data-test-action="test404">Test 404 Error</button>
                <div id="result-404" class="mt-3"></div>
            </div>
        </div>
        
        <div class="card mb-3">
            <div class="card-header">
                <h5>Test 2: Network Error (Invalid URL)</h5>
            </div>
            <div class="card-body">
                <button class="btn btn-primary" data-test-action="testNetworkError">Test Network Error</button>
                <div id="result-network" class="mt-3"></div>
            </div>
        </div>
        
        <div class="card mb-3">
            <div class="card-header">
                <h5>Test 3: Timeout (Slow endpoint)</h5>
            </div>
            <div class="card-body">
                <button class="btn btn-primary" data-test-action="testTimeout">Test Timeout</button>
                <div id="result-timeout" class="mt-3"></div>
            </div>
        </div>
        
        <div class="card mb-3">
            <div class="card-header">
                <h5>Test 4: Successful Request</h5>
            </div>
            <div class="card-body">
                <button class="btn btn-success" data-test-action="testSuccess">Test Success</button>
                <div id="result-success" class="mt-3"></div>
            </div>
        </div>
        
        <div class="card mb-3">
            <div class="card-header">
                <h5>Test 5: Retry Logic</h5>
            </div>
            <div class="card-body">
                <button class="btn btn-warning" data-test-action="testRetry">Test Retry (watch console)</button>
                <div id="result-retry" class="mt-3"></div>
            </div>
        </div>
    </div>
    
    <script src="/js/api-client.js"></script>
    <script src="/js/test-error-handling.js"></script>
</body>
</html>
