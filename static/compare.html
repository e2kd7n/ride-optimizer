<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script>
    (function () {
        try {
            var t = localStorage.getItem('fairWeatherTheme');
            if (t !== 'day' && t !== 'night') {
                t = (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'night' : 'day';
            }
            document.documentElement.setAttribute('data-theme', t);
        } catch (e) {}
    })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compare Routes - Ride Optimizer</title>
    <link rel="icon" type="image/svg+xml" href="/img/favicon.svg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
    <link rel="stylesheet" href="/css/main.css">
    <style>
        .comparison-table {
            overflow-x: auto;
        }
        .comparison-table th {
            background-color: var(--surface-2);
            font-weight: 600;
            position: sticky;
            left: 0;
            z-index: 10;
        }
        .comparison-table td:first-child {
            background-color: var(--surface-2);
            font-weight: 600;
            position: sticky;
            left: 0;
            z-index: 5;
        }
        .route-map-small {
            height: 200px;
            border-radius: 8px;
            margin-bottom: var(--space-3);
        }
        .metric-highlight {
            font-size: var(--font-size-lg);
            font-weight: 700;
            color: var(--primary-color);
        }
        .winner-badge {
            background-color: var(--success);
            color: white;
            padding: var(--space-1) var(--space-2);
            border-radius: 4px;
            font-size: var(--font-size-xs);
            font-weight: 600;
        }
    </style>
</head>

    <nav class="navbar navbar-expand-lg navbar-fairweather" role="navigation" aria-label="Main navigation">

                    <circle cx="24" cy="24" r="12" stroke="currentColor" stroke-width="3.4"/>
                    <g stroke="currentColor" stroke-width="3.4" stroke-linecap="round">
                        <line x1="24" y1="2" x2="24" y2="8"/><line x1="24" y1="40" x2="24" y2="46"/>
                        <line x1="2" y1="24" x2="8" y2="24"/><line x1="40" y1="24" x2="46" y2="24"/>
                        <line x1="8.3" y1="8.3" x2="12.5" y2="12.5"/><line x1="35.5" y1="35.5" x2="39.7" y2="39.7"/>
                        <line x1="39.7" y1="8.3" x2="35.5" y2="12.5"/><line x1="12.5" y1="35.5" x2="8.3" y2="39.7"/>
                    </g>
                </svg>
                <span><span class="brand-ride">Ride</span>&nbsp;<span class="brand-optimizer">Optimizer</span></span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="/"><i class="bi bi-house-door" aria-hidden="true"></i> Home</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/routes.html" aria-current="page"><i class="bi bi-map" aria-hidden="true"></i> Routes</a></li>
                    <li class="nav-item"><a class="nav-link" href="/reports.html"><i class="bi bi-bar-chart-line" aria-hidden="true"></i> Reports</a></li>
                    <li class="nav-item"><a class="nav-link" href="/explore.html"><i class="bi bi-compass" aria-hidden="true"></i> Explore</a></li>
                    <li class="nav-item"><a class="nav-link" href="/weather.html"><i class="bi bi-cloud-sun" aria-hidden="true"></i> Weather</a></li>
                    <li class="nav-item"><a class="nav-link" href="/settings.html"><i class="bi bi-gear" aria-hidden="true"></i> Settings</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Skip Links for Accessibility -->

                    <span class="visually-hidden">Loading comparison...</span>

            <span>More</span>
        </button>

    <footer class="mt-3">
        <div class="container text-center text-muted">
            <small>Ride Optimizer v0.17.0 - Smart Static Architecture</small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script src="/js/common.js"></script>
