<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Commute - Ride Optimizer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/main.css">
    <style>
        /* Commute-specific styles */
        .commute-container {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .commute-cards {
            flex: 0 0 400px;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        
        .commute-map {
            flex: 1;
            min-height: 600px;
            display: flex;
            flex-direction: column;
        }
        
        .commute-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.95) 0%, rgba(248,249,250,0.95) 100%);
            border-radius: 0.5rem;
            padding: 1.5rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
        }
        
        .commute-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.15);
        }
        
        .commute-card.active {
            box-shadow: 0 4px 20px rgba(0,123,255,0.3);
            border: 2px solid #007bff;
        }
        
        .commute-card.to-work {
            border-left: 4px solid #28a745;
        }
        
        .commute-card.to-home {
            border-left: 4px solid #007bff;
        }
        
        .commute-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        
        .commute-direction {
            font-size: 1.25rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .commute-score {
            font-size: 2rem;
            font-weight: 700;
            color: #28a745;
        }
        
        .commute-score.medium {
            color: #ffc107;
        }
        
        .commute-score.low {
            color: #dc3545;
        }
        
        .commute-route-name {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
        }
        
        .commute-metrics {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            font-size: 0.875rem;
        }
        
        .commute-metric {
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }
        
        .commute-time-window {
            font-size: 0.875rem;
            color: #6c757d;
            margin-top: 0.5rem;
        }
        
        #commute-map-container {
            flex: 1;
            width: 100%;
            border-radius: 0.5rem;
            overflow: hidden;
            border: 1px solid #dee2e6;
        }
        
        #commute-map-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        
        /* Mobile responsive */
        @media (max-width: 767px) {
            .commute-container {
                flex-direction: column;
            }
            
            .commute-cards {
                flex: 1;
                order: 1;
            }
            
            .commute-map {
                flex: 1;
                min-height: 400px;
                order: 2;
            }
        }
        
        /* Loading skeleton */
        .skeleton-commute-card {
            height: 200px;
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
            border-radius: 0.5rem;
        }
        
        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body>
    <!-- Skip Links for Accessibility -->
    <a href="#main-content" class="skip-link">Skip to main content</a>
    
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                <i class="bi bi-bicycle"></i> Ride Optimizer
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="/">
                            <i class="bi bi-house-door"></i> Home
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/commute.html">
                            <i class="bi bi-signpost-2"></i> Commute
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/routes.html">
                            <i class="bi bi-map"></i> Routes
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/settings.html">
                            <i class="bi bi-gear"></i> Settings
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main id="main-content" class="container mt-4">
        <div class="row mb-4">
            <div class="col-12">
                <h2>
                    <i class="bi bi-signpost-2"></i> Your Commute
                </h2>
                <p class="text-muted">Time-aware route recommendations for your daily commute</p>
            </div>
        </div>

        <!-- Commute View: Side-by-side layout -->
        <div class="commute-container">
            <!-- Left: Route Cards -->
            <div class="commute-cards" id="commute-cards">
                <!-- Loading skeletons -->
                <div class="skeleton-commute-card"></div>
                <div class="skeleton-commute-card"></div>
            </div>
            
            <!-- Right: Map -->
            <div class="commute-map">
                <div class="card h-100">
                    <div class="card-body p-0">
                        <iframe 
                            id="commute-map-container" 
                            style="width: 100%; height: 100%; border: none;"
                            title="Commute routes map">
                        </iframe>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="mt-5 py-3 bg-light">
        <div class="container text-center text-muted">
            <small>Ride Optimizer v0.13.0 - Smart Commute Planning</small>
        </div>
    </footer>

    <!-- Bottom Navigation (Mobile) -->
    <nav id="bottom-nav" class="bottom-nav d-md-none" role="navigation" aria-label="Mobile navigation">
        <button class="bottom-nav-item" data-target="home" aria-label="Home" onclick="window.location.href='/'">
            <i class="bi bi-house-door" aria-hidden="true"></i>
            <span>Home</span>
        </button>
        <button class="bottom-nav-item active" data-target="commute" aria-label="Commute" aria-current="page">
            <i class="bi bi-signpost-2" aria-hidden="true"></i>
            <span>Commute</span>
        </button>
        <button class="bottom-nav-item" data-target="routes" aria-label="Routes" onclick="window.location.href='/routes.html'">
            <i class="bi bi-map" aria-hidden="true"></i>
            <span>Routes</span>
        </button>
        <button class="bottom-nav-item" data-target="settings" aria-label="Settings" onclick="window.location.href='/settings.html'">
            <i class="bi bi-gear" aria-hidden="true"></i>
            <span>Settings</span>
        </button>
    </nav>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/common.js"></script>
    <script src="/js/commute.js"></script>
</body>
</html>
