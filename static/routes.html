<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Routes - Ride Optimizer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
    <link rel="stylesheet" href="/css/main.css">
    <style>
        #routes-map {
            height: 400px;
            min-height: 320px;
            border-radius: 0.5rem;
            transition: height 0.3s ease;
        }
        #routes-map.expanded {
            height: 600px;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                <i class="bi bi-bicycle"></i> Ride Optimizer
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="/">
                            <i class="bi bi-house-door"></i> Home
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/routes.html">
                            <i class="bi bi-map"></i> Routes
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/settings.html">
                            <i class="bi bi-gear"></i> Settings
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container mt-4">
        <div class="row mb-4">
            <div class="col-12">
                <h2>
                    <i class="bi bi-map"></i> Route Library
                </h2>
                <p class="text-muted">Browse and manage your cycling routes</p>
            </div>
        </div>

        <!-- Filters Section -->
        <div class="filters-section">
            <h5 class="mb-3">
                <i class="bi bi-funnel"></i> Filters
            </h5>
            
            <!-- Quick Preset Buttons (Mobile-First) -->
            <div class="mb-3">
                <div class="d-flex flex-wrap gap-2" role="group" aria-label="Quick distance filters">
                    <button type="button" class="btn btn-outline-primary btn-sm preset-filter" data-preset="short">
                        <i class="bi bi-lightning"></i> Short (<10mi)
                    </button>
                    <button type="button" class="btn btn-outline-primary btn-sm preset-filter" data-preset="medium">
                        <i class="bi bi-bicycle"></i> Medium (10-20mi)
                    </button>
                    <button type="button" class="btn btn-outline-primary btn-sm preset-filter" data-preset="long">
                        <i class="bi bi-signpost-2"></i> Long (>20mi)
                    </button>
                    <button type="button" class="btn btn-outline-secondary btn-sm preset-filter" data-preset="all">
                        <i class="bi bi-x-circle"></i> Clear
                    </button>
                </div>
            </div>

            <div class="row">
                <div class="col-md-3 col-sm-6">
                    <div class="filter-group">
                        <label for="filter-favorite">Favorites</label>
                        <select id="filter-favorite" class="form-select">
                            <option value="">All Routes</option>
                            <option value="true">Favorites Only</option>
                            <option value="false">Non-Favorites</option>
                        </select>
                    </div>
                </div>
                <div class="col-md-3 col-sm-6">
                    <div class="filter-group">
                        <label for="filter-sport-type">Sport Type</label>
                        <select id="filter-sport-type" class="form-select">
                            <option value="">All Types</option>
                            <option value="Ride">Ride</option>
                            <option value="VirtualRide">Virtual Ride</option>
                            <option value="EBikeRide">E-Bike</option>
                            <option value="GravelRide">Gravel</option>
                        </select>
                    </div>
                </div>
                <div class="col-md-3 col-sm-6">
                    <div class="filter-group">
                        <label for="filter-difficulty">Difficulty</label>
                        <select id="filter-difficulty" class="form-select">
                            <option value="">All Levels</option>
                            <option value="easy">Easy</option>
                            <option value="moderate">Moderate</option>
                            <option value="hard">Hard</option>
                        </select>
                    </div>
                </div>
                <div class="col-md-3 col-sm-6">
                    <div class="filter-group">
                        <label for="filter-min-distance" id="filter-min-distance-label">Min Distance (mi)</label>
                        <input type="number" id="filter-min-distance" class="form-control" placeholder="0" min="0" step="0.1">
                    </div>
                </div>
                <div class="col-md-3 col-sm-6">
                    <div class="filter-group">
                        <label for="filter-max-distance" id="filter-max-distance-label">Max Distance (mi)</label>
                        <input type="number" id="filter-max-distance" class="form-control" placeholder="100" min="0" step="0.1">
                    </div>
                </div>
            </div>
            <div class="row mt-3">
                <div class="col-md-4">
                    <div class="filter-group">
                        <label for="sort-by">Sort By</label>
                        <select id="sort-by" class="form-select">
                            <option value="name">Name (A-Z)</option>
                            <option value="name-desc">Name (Z-A)</option>
                            <option value="distance">Distance (Low-High)</option>
                            <option value="distance-desc">Distance (High-Low)</option>
                            <option value="elevation">Elevation (Low-High)</option>
                            <option value="elevation-desc">Elevation (High-Low)</option>
                            <option value="uses">Most Used</option>
                        </select>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="filter-group">
                        <label for="search-query">Search</label>
                        <input type="text" id="search-query" class="form-control" placeholder="Search routes...">
                    </div>
                </div>
                <div class="col-md-4 d-flex align-items-end">
                    <button id="apply-filters" class="btn btn-primary w-100">
                        <i class="bi bi-search"></i> Apply Filters
                    </button>
                </div>
            </div>
        </div>

        <!-- Results Summary -->
        <div class="row mb-3">
            <div class="col-12">
                <div id="results-summary" class="alert alert-info">
                    <i class="bi bi-info-circle"></i> Loading routes...
                </div>
            </div>
        </div>

        <!-- Map Section -->
        <div class="row mb-4">
            <div class="col-12">
                <div class="card">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h3 class="h5 mb-0">
                                <i class="bi bi-map"></i> Map
                            </h3>
                            <div class="btn-group" role="group" aria-label="Map controls">
                                <button type="button" id="fit-all-btn" class="btn btn-sm btn-outline-primary" title="Fit all routes in view">
                                    <i class="bi bi-arrows-angle-contract"></i> Fit All
                                </button>
                                <button type="button" id="clear-map-btn" class="btn btn-sm btn-outline-secondary" title="Clear all routes from map">
                                    <i class="bi bi-x-circle"></i> Clear
                                </button>
                            </div>
                        </div>
                        <div id="routes-map" aria-label="Interactive routes map"></div>
                        <div id="map-status" class="mt-2 text-muted small">
                            Click on routes below to display them on the map
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Routes Grid -->
        <div id="routes-container">
            <div class="text-center py-5">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
                <p class="mt-3 text-muted">Loading routes...</p>
            </div>
        </div>

        <div id="routes-live-region" class="visually-hidden" aria-live="polite" aria-atomic="true"></div>

        <!-- Pagination -->
        <div id="pagination-container" class="mt-4"></div>
    </div>

    <!-- Footer -->
    <footer class="mt-5 py-3 bg-light">
        <div class="container text-center text-muted">
            <small>Ride Optimizer v0.11.0 - Smart Static Architecture</small>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script src="/js/common.js"></script>
    <script src="/js/api-client.js?v=4"></script>
    <script src="/js/routes.js?v=4"></script>
    <script>
        // Update filter labels based on unit preference
        document.addEventListener('DOMContentLoaded', function() {
            const unitSystem = window.getUnitSystem();
            const distanceUnit = window.getDistanceUnit();
            
            // Update filter labels
            const minLabel = document.getElementById('filter-min-distance-label');
            const maxLabel = document.getElementById('filter-max-distance-label');
            
            if (minLabel) minLabel.textContent = `Min Distance (${distanceUnit})`;
            if (maxLabel) maxLabel.textContent = `Max Distance (${distanceUnit})`;
            
            // Update preset button labels
            const presetButtons = document.querySelectorAll('.preset-filter');
            presetButtons.forEach(btn => {
                const preset = btn.getAttribute('data-preset');
                const icon = btn.querySelector('i');
                const iconClass = icon ? icon.className : '';
                
                if (preset === 'short') {
                    btn.innerHTML = `<i class="${iconClass}"></i> Short (<${unitSystem === 'imperial' ? '10mi' : '16km'})`;
                } else if (preset === 'medium') {
                    btn.innerHTML = `<i class="${iconClass}"></i> Medium (${unitSystem === 'imperial' ? '10-20mi' : '16-32km'})`;
                } else if (preset === 'long') {
                    btn.innerHTML = `<i class="${iconClass}"></i> Long (>${unitSystem === 'imperial' ? '20mi' : '32km'})`;
                }
            });
        });
    <!-- Bottom Navigation (Mobile) - Issue #277 -->
    <nav id="bottom-nav" class="bottom-nav d-md-none" role="navigation" aria-label="Mobile navigation">
        <button
            class="bottom-nav-item"
            data-target="home"
            aria-label="Navigate to Home"
            type="button"
            tabindex="0"
            onclick="window.location.href='/'">
            <i class="bi bi-house-door" aria-hidden="true"></i>
            <span>Home</span>
        </button>
        <button
            class="bottom-nav-item active"
            data-target="routes"
            aria-label="Navigate to Routes"
            aria-current="page"
            type="button"
            tabindex="0">
            <i class="bi bi-map" aria-hidden="true"></i>
            <span>Routes</span>
        </button>
        <button
            class="bottom-nav-item"
            data-target="settings"
            aria-label="Navigate to Settings"
            type="button"
            tabindex="0"
            onclick="window.location.href='/settings.html'">
            <i class="bi bi-gear" aria-hidden="true"></i>
            <span>Settings</span>
        </button>
    </nav>
    
    </script>
</body>
</html>
