<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Routes - Ride Optimizer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/main.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                <i class="bi bi-bicycle"></i> Ride Optimizer
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="/">
                            <i class="bi bi-house-door"></i> Home
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/routes.html">
                            <i class="bi bi-map"></i> Routes
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/settings.html">
                            <i class="bi bi-gear"></i> Settings
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container mt-4">
        <div class="row mb-4">
            <div class="col-12">
                <h2>
                    <i class="bi bi-map"></i> Route Library
                </h2>
                <p class="text-muted">Browse and manage your cycling routes</p>
            </div>
        </div>

        <!-- Filters Section -->
        <div class="filters-section">
            <h5 class="mb-3">
                <i class="bi bi-funnel"></i> Filters
            </h5>
            <div class="row">
                <div class="col-md-3 col-sm-6">
                    <div class="filter-group">
                        <label for="filter-favorite">Favorites</label>
                        <select id="filter-favorite" class="form-select">
                            <option value="">All Routes</option>
                            <option value="true">Favorites Only</option>
                            <option value="false">Non-Favorites</option>
                        </select>
                    </div>
                </div>
                <div class="col-md-3 col-sm-6">
                    <div class="filter-group">
                        <label for="filter-sport-type">Sport Type</label>
                        <select id="filter-sport-type" class="form-select">
                            <option value="">All Types</option>
                            <option value="Ride">Ride</option>
                            <option value="VirtualRide">Virtual Ride</option>
                            <option value="EBikeRide">E-Bike</option>
                            <option value="GravelRide">Gravel</option>
                        </select>
                    </div>
                </div>
                <div class="col-md-3 col-sm-6">
                    <div class="filter-group">
                        <label for="filter-min-distance">Min Distance (mi)</label>
                        <input type="number" id="filter-min-distance" class="form-control" placeholder="0" min="0" step="0.1">
                    </div>
                </div>
                <div class="col-md-3 col-sm-6">
                    <div class="filter-group">
                        <label for="filter-max-distance">Max Distance (mi)</label>
                        <input type="number" id="filter-max-distance" class="form-control" placeholder="100" min="0" step="0.1">
                    </div>
                </div>
            </div>
            <div class="row mt-3">
                <div class="col-md-4">
                    <div class="filter-group">
                        <label for="sort-by">Sort By</label>
                        <select id="sort-by" class="form-select">
                            <option value="name">Name (A-Z)</option>
                            <option value="name-desc">Name (Z-A)</option>
                            <option value="distance">Distance (Low-High)</option>
                            <option value="distance-desc">Distance (High-Low)</option>
                            <option value="elevation">Elevation (Low-High)</option>
                            <option value="elevation-desc">Elevation (High-Low)</option>
                            <option value="uses">Most Used</option>
                        </select>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="filter-group">
                        <label for="search-query">Search</label>
                        <input type="text" id="search-query" class="form-control" placeholder="Search routes...">
                    </div>
                </div>
                <div class="col-md-4 d-flex align-items-end">
                    <button id="apply-filters" class="btn btn-primary w-100">
                        <i class="bi bi-search"></i> Apply Filters
                    </button>
                </div>
            </div>
        </div>

        <!-- Results Summary -->
        <div class="row mb-3">
            <div class="col-12">
                <div id="results-summary" class="alert alert-info">
                    <i class="bi bi-info-circle"></i> Loading routes...
                </div>
            </div>
        </div>

        <!-- Routes Grid -->
        <div id="routes-container">
            <div class="text-center py-5">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
                <p class="mt-3 text-muted">Loading routes...</p>
            </div>
        </div>

        <!-- Pagination -->
        <div id="pagination-container" class="mt-4"></div>
    </div>

    <!-- Footer -->
    <footer class="mt-5 py-3 bg-light">
        <div class="container text-center text-muted">
            <small>Ride Optimizer v0.11.0 - Smart Static Architecture</small>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/api-client.js"></script>
    <script src="/js/routes.js"></script>
</body>
</html>
