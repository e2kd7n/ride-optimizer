<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Routes - Ride Optimizer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
    <link rel="stylesheet" href="/css/main.css">
    <style>
        #routes-map {
            height: var(--map-height-large);
            min-height: 400px;
            border-radius: 0 0 8px 8px;
        }

        /* Force single-column cards inside the scrollable list panel */
        #routes-container .row > [class*="col-"] {
            flex: 0 0 100%;
            max-width: 100%;
        }

        .route-list-scroll {
            height: var(--map-height-large);
            overflow-y: auto;
            overflow-x: hidden;
        }

        /* Map panel stays visible while the route list scrolls */
        .map-panel-sticky {
            position: sticky;
            top: 72px;
        }

        #results-summary {
            padding: var(--space-1) var(--space-2);
            margin-bottom: var(--space-2);
            font-size: var(--font-size-sm);
        }
    </style>
</head>
<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>

    <nav class="navbar navbar-expand-lg navbar-dark navbar-gradient" role="navigation" aria-label="Main navigation">
        <div class="container">
            <a class="navbar-brand" href="/" aria-label="Ride Optimizer Home"><i class="bi bi-bicycle" aria-hidden="true"></i> Ride Optimizer</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="/"><i class="bi bi-house-door" aria-hidden="true"></i> Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="/commute.html"><i class="bi bi-signpost-2" aria-hidden="true"></i> Commute</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/routes.html" aria-current="page"><i class="bi bi-map" aria-hidden="true"></i> Routes</a></li>
                    <li class="nav-item"><a class="nav-link" href="/reports.html"><i class="bi bi-bar-chart-line" aria-hidden="true"></i> Reports</a></li>
                    <li class="nav-item"><a class="nav-link" href="/weather.html"><i class="bi bi-cloud-sun" aria-hidden="true"></i> Weather</a></li>
                    <li class="nav-item"><a class="nav-link" href="/settings.html"><i class="bi bi-gear" aria-hidden="true"></i> Settings</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main id="main-content" class="container mt-2 mb-3" role="main">
        <!-- Compact filter card: all controls visible above the fold -->
        <div class="card mb-2">
            <div class="card-body py-2 px-3">
                <!-- Row 1: Quick presets + search -->
                <div class="d-flex flex-wrap align-items-center gap-2 mb-2">
                    <div class="d-flex gap-1 flex-shrink-0" role="group" aria-label="Quick distance filters">
                        <button type="button" class="btn btn-sm btn-outline-secondary preset-filter active" data-preset="all">All</button>
                        <button type="button" class="btn btn-sm btn-outline-primary preset-filter" data-preset="short">
                            <i class="bi bi-lightning" aria-hidden="true"></i> Short
                        </button>
                        <button type="button" class="btn btn-sm btn-outline-primary preset-filter" data-preset="medium">
                            <i class="bi bi-bicycle" aria-hidden="true"></i> Medium
                        </button>
                        <button type="button" class="btn btn-sm btn-outline-primary preset-filter" data-preset="long">
                            <i class="bi bi-signpost-2" aria-hidden="true"></i> Long
                        </button>
                    </div>
                    <div class="flex-grow-1" style="min-width: 160px; max-width: 320px;">
                        <input type="text" id="search-query" class="form-control form-control-sm"
                               placeholder="Search routes…" aria-label="Search routes">
                    </div>
                </div>
                <!-- Row 2: Dropdown filters + sort -->
                <div class="d-flex flex-wrap gap-2 align-items-end">
                    <div style="min-width: 112px;">
                        <label for="filter-favorite" class="form-label mb-0 small">Favorites</label>
                        <select id="filter-favorite" class="form-select form-select-sm">
                            <option value="">All Routes</option>
                            <option value="true">Favorites Only</option>
                            <option value="false">Non-Favorites</option>
                        </select>
                    </div>
                    <div style="min-width: 112px;">
                        <label for="filter-commute" class="form-label mb-0 small">Commute</label>
                        <select id="filter-commute" class="form-select form-select-sm">
                            <option value="">All Routes</option>
                            <option value="commute">Commutes Only</option>
                            <option value="non-commute">Non-Commutes</option>
                        </select>
                    </div>
                    <div style="min-width: 104px;">
                        <label for="filter-sport-type" class="form-label mb-0 small">Type</label>
                        <select id="filter-sport-type" class="form-select form-select-sm">
                            <option value="">All Types</option>
                            <option value="Ride">Ride</option>
                            <option value="VirtualRide">Virtual</option>
                            <option value="EBikeRide">E-Bike</option>
                            <option value="GravelRide">Gravel</option>
                        </select>
                    </div>
                    <div style="min-width: 112px;">
                        <label for="filter-difficulty" class="form-label mb-0 small">Difficulty</label>
                        <select id="filter-difficulty" class="form-select form-select-sm">
                            <option value="">All Levels</option>
                            <option value="easy">Easy</option>
                            <option value="moderate">Moderate</option>
                            <option value="hard">Hard</option>
                            <option value="very hard">Very Hard</option>
                        </select>
                    </div>
                    <div style="width: 88px;">
                        <label for="filter-min-distance" id="filter-min-distance-label" class="form-label mb-0 small">Min (mi)</label>
                        <input type="number" id="filter-min-distance" class="form-control form-control-sm"
                               placeholder="0" min="0" step="0.1">
                    </div>
                    <div style="width: 88px;">
                        <label for="filter-max-distance" id="filter-max-distance-label" class="form-label mb-0 small">Max (mi)</label>
                        <input type="number" id="filter-max-distance" class="form-control form-control-sm"
                               placeholder="∞" min="0" step="0.1">
                    </div>
                    <div style="min-width: 120px;">
                        <label for="filter-date-range" class="form-label mb-0 small">Ridden</label>
                        <select id="filter-date-range" class="form-select form-select-sm">
                            <option value="">Any time</option>
                            <option value="30">Last 30 days</option>
                            <option value="90">Last 3 months</option>
                            <option value="180">Last 6 months</option>
                            <option value="365">Last 12 months</option>
                        </select>
                    </div>
                    <div style="min-width: 144px;">
                        <label for="sort-by" class="form-label mb-0 small">Sort</label>
                        <select id="sort-by" class="form-select form-select-sm">
                            <option value="name">Name (A–Z)</option>
                            <option value="name-desc">Name (Z–A)</option>
                            <option value="distance">Distance ↑</option>
                            <option value="distance-desc">Distance ↓</option>
                            <option value="elevation">Elevation ↑</option>
                            <option value="elevation-desc">Elevation ↓</option>
                            <option value="uses">Most Used</option>
                            <option value="recent">Most Recent</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <!-- Saved Plans -->
        <div id="saved-plans-section" class="mb-3" style="display: none;">
            <div class="card">
                <div class="card-header d-flex justify-content-between align-items-center py-2">
                    <span class="small fw-semibold"><i class="bi bi-calendar-check" aria-hidden="true"></i> Saved Plans</span>
                    <button type="button" class="btn btn-sm btn-outline-secondary" id="toggle-plans-btn" aria-expanded="true" aria-label="Toggle saved plans">
                        <i class="bi bi-chevron-up" aria-hidden="true"></i>
                    </button>
                </div>
                <div class="card-body py-2" id="saved-plans-body">
                    <div id="saved-plans-list"></div>
                </div>
            </div>
        </div>

        <!-- Results summary -->
        <div id="results-summary" class="alert alert-info">
            <i class="bi bi-info-circle" aria-hidden="true"></i> Loading routes…
        </div>

        <!-- Side-by-side: scrollable route list (left) + sticky map (right) -->
        <div class="row g-2">
            <!-- Route list -->
            <div class="col-lg-5">
                <div id="routes-container" class="route-list-scroll">
                    <!-- Skeleton loaders -->
                    <div class="row g-3">
                        <div class="col-12">
                            <div class="skeleton-route-card" aria-busy="true" aria-label="Loading route">
                                <div class="skeleton skeleton-route-card-rank"></div>
                                <div class="skeleton skeleton-route-card-name"></div>
                                <div class="skeleton-route-card-metrics">
                                    <div class="skeleton skeleton-route-card-metric"></div>
                                    <div class="skeleton skeleton-route-card-metric"></div>
                                    <div class="skeleton skeleton-route-card-metric"></div>
                                </div>
                            </div>
                        </div>
                        <div class="col-12">
                            <div class="skeleton-route-card" aria-busy="true" aria-label="Loading route">
                                <div class="skeleton skeleton-route-card-rank"></div>
                                <div class="skeleton skeleton-route-card-name"></div>
                                <div class="skeleton-route-card-metrics">
                                    <div class="skeleton skeleton-route-card-metric"></div>
                                    <div class="skeleton skeleton-route-card-metric"></div>
                                    <div class="skeleton skeleton-route-card-metric"></div>
                                </div>
                            </div>
                        </div>
                        <div class="col-12">
                            <div class="skeleton-route-card" aria-busy="true" aria-label="Loading route">
                                <div class="skeleton skeleton-route-card-rank"></div>
                                <div class="skeleton skeleton-route-card-name"></div>
                                <div class="skeleton-route-card-metrics">
                                    <div class="skeleton skeleton-route-card-metric"></div>
                                    <div class="skeleton skeleton-route-card-metric"></div>
                                    <div class="skeleton skeleton-route-card-metric"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div id="routes-live-region" class="visually-hidden" aria-live="polite" aria-atomic="true"></div>
                <div id="pagination-container" class="mt-3"></div>
            </div>

            <!-- Map (sticky) -->
            <div class="col-lg-7">
                <div class="card map-panel-sticky">
                    <div class="card-header d-flex justify-content-between align-items-center py-2">
                        <span class="small fw-semibold">
                            <i class="bi bi-geo-alt" aria-hidden="true"></i> Map
                        </span>
                        <div class="d-flex align-items-center gap-2">
                            <select id="color-by" class="form-select form-select-sm" style="width: auto; min-width: 120px;" aria-label="Color routes by">
                                <option value="default">Color: Default</option>
                                <option value="distance">Color: Distance</option>
                                <option value="recency">Color: Recency</option>
                            </select>
                            <div class="btn-group btn-group-sm" role="group" aria-label="Map controls">
                                <button type="button" id="show-all-btn" class="btn btn-outline-primary" title="Show all filtered routes on map">
                                    <i class="bi bi-layers" aria-hidden="true"></i> Show All
                                </button>
                                <button type="button" id="fit-all-btn" class="btn btn-outline-secondary" title="Fit all routes in view">
                                    <i class="bi bi-arrows-angle-contract" aria-hidden="true"></i> Fit All
                                </button>
                                <button type="button" id="clear-map-btn" class="btn btn-outline-secondary" title="Clear all routes from map">
                                    <i class="bi bi-x-circle" aria-hidden="true"></i> Clear
                                </button>
                            </div>
                        </div>
                    </div>
                    <div class="card-body p-0">
                        <div id="routes-map" aria-label="Interactive routes map"></div>
                        <div id="map-status" class="px-3 py-1 text-muted small border-top">
                            Click a route to display it on the map
                        </div>
                        <div id="map-legend" class="px-3 py-1 small border-top" style="display: none;"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Bottom Navigation (Mobile) -->
    <nav id="bottom-nav" class="bottom-nav d-md-none" role="navigation" aria-label="Mobile navigation">
        <button class="bottom-nav-item" aria-label="Home" onclick="window.location.href='/'">
            <i class="bi bi-house-door" aria-hidden="true"></i>
            <span>Home</span>
        </button>
        <button class="bottom-nav-item active" aria-label="Routes" aria-current="page">
            <i class="bi bi-map" aria-hidden="true"></i>
            <span>Routes</span>
        </button>
        <button class="bottom-nav-item" aria-label="Weather" onclick="window.location.href='/weather.html'">
            <i class="bi bi-cloud-sun" aria-hidden="true"></i>
            <span>Weather</span>
        </button>
        <button class="bottom-nav-item" aria-label="Settings" onclick="window.location.href='/settings.html'">
            <i class="bi bi-gear" aria-hidden="true"></i>
            <span>Settings</span>
        </button>
    </nav>

    <footer class="mt-3 bg-light">
        <div class="container text-center text-muted">
            <small>Ride Optimizer v0.14.0 - Smart Static Architecture</small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script src="/js/common.js"></script>
    <script src="/js/help-modal.js"></script>
    <script src="/js/api-client.js?v=4"></script>
    <script src="/js/routes.js?v=4"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const unitSystem = window.getUnitSystem ? window.getUnitSystem() : 'imperial';
            const distanceUnit = window.getDistanceUnit ? window.getDistanceUnit() : 'mi';

            const minLabel = document.getElementById('filter-min-distance-label');
            const maxLabel = document.getElementById('filter-max-distance-label');
            if (minLabel) minLabel.textContent = `Min (${distanceUnit})`;
            if (maxLabel) maxLabel.textContent = `Max (${distanceUnit})`;

            const presetButtons = document.querySelectorAll('.preset-filter');
            presetButtons.forEach(btn => {
                const preset = btn.getAttribute('data-preset');
                const icon = btn.querySelector('i');
                const iconHtml = icon ? icon.outerHTML + ' ' : '';
                if (preset === 'short') {
                    btn.innerHTML = `${iconHtml}Short (<${unitSystem === 'imperial' ? '10mi' : '16km'})`;
                } else if (preset === 'medium') {
                    btn.innerHTML = `${iconHtml}Medium (${unitSystem === 'imperial' ? '10–20mi' : '16–32km'})`;
                } else if (preset === 'long') {
                    btn.innerHTML = `${iconHtml}Long (>${unitSystem === 'imperial' ? '20mi' : '32km'})`;
                }
            });
        });
    </script>
</body>
</html>
