<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script>
    (function () {
        try {
            var t = localStorage.getItem('fairWeatherTheme');
            if (t !== 'day' && t !== 'night') {
                t = (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'night' : 'day';
            }
            document.documentElement.setAttribute('data-theme', t);
        } catch (e) {}
    })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Route Details - Ride Optimizer</title>
    <link rel="icon" type="image/svg+xml" href="/img/favicon.svg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
    <link rel="stylesheet" href="/css/main.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        #route-map {
            height: var(--map-height-standard);
            border-radius: 8px;
        }
        @media (max-width: 991.98px) {
            #route-map { height: 320px; }
        }
        @media (max-width: 767.98px) {
            /* #371c: fixed 320px map fills the whole viewport on short mobile screens;
               cap it so content peeks above/below. */
            #route-map { max-height: 50vh; }
        }
        .metric-card {
            height: 100%;
        }
        .detail-chip {
            display: inline-flex;
            align-items: center;
            gap: var(--space-1);
            padding: var(--space-1) var(--space-2);
            border-radius: 999px;
            background: var(--surface-2);
            margin: 0 var(--space-2) var(--space-2) 0;
        }
        /* Demoted secondary metric (popularity/uses) — same chip shape, muted ink */
        .detail-chip-muted {
            color: var(--ink-soft);
        }
        .performance-placeholder {
            color: var(--ink-soft);
        }
    </style>
</head>

                        <line x1="24" y1="2" x2="24" y2="8"/><line x1="24" y1="40" x2="24" y2="46"/>
                        <line x1="2" y1="24" x2="8" y2="24"/><line x1="40" y1="24" x2="46" y2="24"/>

                        <line x1="39.7" y1="8.3" x2="35.5" y2="12.5"/><line x1="12.5" y1="35.5" x2="8.3" y2="39.7"/>
