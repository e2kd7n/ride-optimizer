<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Route Details - Ride Optimizer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/static/css/main.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                <i class="bi bi-bicycle"></i> Ride Optimizer
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="/dashboard.html">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/commute.html">Commute</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/planner.html">Planner</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/routes.html">Routes</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container mt-4">
        <!-- Back Button -->
        <div class="row mb-3">
            <div class="col-12">
                <a href="/routes.html" class="btn btn-outline-secondary">
                    <i class="bi bi-arrow-left"></i> Back to Routes
                </a>
            </div>
        </div>

        <!-- Route Details -->
        <div id="route-details">
            <div class="text-center py-5">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
                <p class="mt-3 text-muted">Loading route details...</p>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="mt-5 py-3 bg-light">
        <div class="container text-center text-muted">
            <small>Ride Optimizer v0.11.0 - Smart Static Architecture</small>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/api-client.js"></script>
    <script>
        // Get route ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const routeId = urlParams.get('id');

        if (!routeId) {
            document.getElementById('route-details').innerHTML = `
                <div class="alert alert-danger">
                    <i class="bi bi-exclamation-triangle"></i> No route ID specified
                </div>
            `;
        } else {
            loadRouteDetails(routeId);
        }

        async function loadRouteDetails(routeId) {
            try {
                // For now, fetch all routes and find the one we need
                const data = await window.apiClient.getRoutes();
                const route = data.routes.find(r => r.id === routeId);

                if (!route) {
                    document.getElementById('route-details').innerHTML = `
                        <div class="alert alert-warning">
                            <i class="bi bi-exclamation-triangle"></i> Route not found
                        </div>
                    `;
                    return;
                }

                // Display route details
                document.getElementById('route-details').innerHTML = `
                    <div class="row">
                        <div class="col-12">
                            <h2>${route.name}</h2>
                            ${route.is_favorite ? '<span class="badge bg-warning text-dark"><i class="bi bi-star-fill"></i> Favorite</span>' : ''}
                        </div>
                    </div>

                    <div class="row mt-4">
                        <div class="col-md-3">
                            <div class="card">
                                <div class="card-body text-center">
                                    <i class="bi bi-rulers fs-1 text-primary"></i>
                                    <h5 class="mt-2">${route.distance.toFixed(1)} mi</h5>
                                    <p class="text-muted mb-0">Distance</p>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="card">
                                <div class="card-body text-center">
                                    <i class="bi bi-graph-up fs-1 text-success"></i>
                                    <h5 class="mt-2">${route.elevation_gain} ft</h5>
                                    <p class="text-muted mb-0">Elevation Gain</p>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="card">
                                <div class="card-body text-center">
                                    <i class="bi bi-bicycle fs-1 text-info"></i>
                                    <h5 class="mt-2">${route.sport_type || 'Ride'}</h5>
                                    <p class="text-muted mb-0">Type</p>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-3">
                            <div class="card">
                                <div class="card-body text-center">
                                    <i class="bi bi-arrow-repeat fs-1 text-warning"></i>
                                    <h5 class="mt-2">${route.uses || 0}</h5>
                                    <p class="text-muted mb-0">Times Used</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="row mt-4">
                        <div class="col-12">
                            <div class="card">
                                <div class="card-body">
                                    <h5 class="card-title">Route Information</h5>
                                    <p class="text-muted">
                                        This route has been ridden ${route.uses || 0} time${route.uses !== 1 ? 's' : ''}.
                                        ${route.type === 'commute' ? 'This is a commute route.' : 'This is a long ride.'}
                                    </p>
                                    ${route.is_plus_route ? '<p class="text-success"><i class="bi bi-star-fill"></i> This is a PLUS route (longer variant)</p>' : ''}
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="row mt-4">
                        <div class="col-12">
                            <div class="alert alert-info">
                                <i class="bi bi-info-circle"></i> 
                                <strong>Coming Soon:</strong> Map visualization, elevation profile, and detailed statistics will be available in a future update.
                            </div>
                        </div>
                    </div>
                `;
            } catch (error) {
                console.error('Failed to load route details:', error);
                document.getElementById('route-details').innerHTML = `
                    <div class="alert alert-danger">
                        <i class="bi bi-exclamation-triangle"></i> Failed to load route details. Please try again later.
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
