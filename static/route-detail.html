<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script>
    (function () {
        try {
            var t = localStorage.getItem('fairWeatherTheme');
            if (t !== 'day' && t !== 'night') {
                t = (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'night' : 'day';
            }
            document.documentElement.setAttribute('data-theme', t);
        } catch (e) {}
    })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Route Details - Ride Optimizer</title>
    <link rel="icon" type="image/svg+xml" href="/img/favicon.svg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
    <link rel="stylesheet" href="/css/main.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        #route-map {
            height: var(--map-height-standard);
            border-radius: 8px;
        }
        @media (max-width: 991.98px) {
            #route-map { height: 320px; }
        }
        @media (max-width: 767.98px) {
            /* #371c: fixed 320px map fills the whole viewport on short mobile screens;
               cap it so content peeks above/below. */
            #route-map { max-height: 50vh; }
        }
        .metric-card {
            height: 100%;
        }
        .detail-chip {
            display: inline-flex;
            align-items: center;
            gap: var(--space-1);
            padding: var(--space-1) var(--space-2);
            border-radius: 999px;
            background: var(--surface-2);
            margin: 0 var(--space-2) var(--space-2) 0;
        }
        /* Demoted secondary metric (popularity/uses) — same chip shape, muted ink */
        .detail-chip-muted {
            color: var(--ink-soft);
        }
        .performance-placeholder {
            color: var(--ink-soft);
        }
    </style>
</head>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script src="/js/common.js"></script>
    <script src="/js/help-modal.js"></script>
    <script src="/js/api-client.js"></script>
    <script>
        (function() {
            let mapInstance = null;

            function byId(id) {
                return document.getElementById(id);
            }

            function announce(message) {
                const liveRegion = byId('route-detail-live-region');
                if (liveRegion) {
                    liveRegion.textContent = message;
                }
            }

            function getRouteParams() {
                const params = new URLSearchParams(window.location.search);
                return {
                    id: params.get('id'),
                    type: params.get('type')
                };
            }

            function formatDuration(durationMinutes) {
                const totalMinutes = Math.round(Number(durationMinutes || 0));
                const hours = Math.floor(totalMinutes / 60);
                const minutes = totalMinutes % 60;
                return hours > 0 ? `${hours}h ${minutes}m` : `${totalMinutes} min`;
            }

            function renderError(message, variant = 'danger') {
                byId('route-details').innerHTML = `
                    <h1 class="mb-3">Route Details</h1>
                    <div class="alert alert-${variant}" role="alert">
                        <i class="bi bi-exclamation-triangle"></i> ${message}
                    </div>
                `;
                announce(message);
            }

            function renderMap(coordinates) {
                const mapElement = byId('route-map');
                if (!mapElement || !Array.isArray(coordinates) || !coordinates.length) {
                    return;
                }

                if (mapInstance) {
                    mapInstance.remove();
                }

                mapInstance = L.map('route-map');
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '© OpenStreetMap contributors',
                    maxZoom: 19
                }).addTo(mapInstance);

                const polyline = L.polyline(coordinates, {
                    color: '#007bff',
                    weight: 5,
                    opacity: 0.85
                }).addTo(mapInstance);

                // Zoom to show entire route with smooth animation (Issue #117)
                mapInstance.fitBounds(polyline.getBounds(), {
                    padding: [50, 50],
                    animate: true,
                    duration: 0.5
                });

                const start = coordinates[0];
                const end = coordinates[coordinates.length - 1];

                L.marker(start).addTo(mapInstance).bindTooltip('Start');
                L.marker(end).addTo(mapInstance).bindTooltip('End');

                // #371c: container height now comes from CSS (incl. the mobile max-height:
                // 50vh rule) rather than an inline style, so re-measure after first paint
                // in case layout wasn't final at init time.
                setTimeout(() => {
                    if (mapInstance) {
                        mapInstance.invalidateSize();
                    }
                }, 100);
            }

            function renderPerformanceCharts(route) {
                const content = byId('performance-content');
                if (!content) return;

                const dataPoints = Array.isArray(route.routes) ? route.routes.length : 0;
                const usesCount = Array.isArray(route.activity_ids) ? route.activity_ids.length : 0;

                // #371b/#376: card is always rendered now (never hidden). Fall back to an
                // informative placeholder when there isn't enough history to chart trends.
                if (dataPoints < 2) {
                    if (dataPoints === 0 && usesCount > 0) {
                        // Long-ride-style routes track uses via activity_ids, not route.routes.
                        content.innerHTML = `
                            <p class="performance-placeholder mb-0">
                                <i class="bi bi-info-circle" aria-hidden="true"></i>
                                History: ${usesCount} recorded ride${usesCount === 1 ? '' : 's'}. Not enough performance data yet to chart trends.
                            </p>
                        `;
                    } else {
                        content.innerHTML = `
                            <p class="performance-placeholder mb-0">
                                <i class="bi bi-info-circle" aria-hidden="true"></i>
                                Not enough rides yet to chart trends — ride this route again to see performance over time.
                            </p>
                        `;
                    }
                    return;
                }

                content.innerHTML = `
                    <div class="row g-4">
                        <div class="col-12 col-lg-6">
                            <h3 class="h6 text-muted mb-3">Average Speed Over Time</h3>
                            <canvas id="speed-chart" style="max-height: var(--chart-height);"></canvas>
                        </div>
                        <div class="col-12 col-lg-6">
                            <h3 class="h6 text-muted mb-3">Duration Trends</h3>
                            <canvas id="duration-chart" style="max-height: var(--chart-height);"></canvas>
                        </div>
                        <div class="col-12 col-lg-6">
                            <h3 class="h6 text-muted mb-3">Heart Rate (if available)</h3>
                            <canvas id="heartrate-chart" style="max-height: var(--chart-height);"></canvas>
                        </div>
                        <div class="col-12 col-lg-6">
                            <h3 class="h6 text-muted mb-3">Power Output (if available)</h3>
                            <canvas id="power-chart" style="max-height: var(--chart-height);"></canvas>
                        </div>
                    </div>
                `;

                // Sort routes by timestamp
                const sortedRoutes = [...route.routes].sort((a, b) =>
                    new Date(a.timestamp) - new Date(b.timestamp)
                );

                // Prepare data
                const labels = sortedRoutes.map(r => {
                    const date = new Date(r.timestamp);
                    return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                });

                const speedData = sortedRoutes.map(r => r.average_speed || 0);
                const durationData = sortedRoutes.map(r => (r.duration || 0) / 60); // Convert to minutes
                const heartrateData = sortedRoutes.map(r => r.average_heartrate || null);
                const powerData = sortedRoutes.map(r => r.average_watts || null);

                // Chart configuration
                const chartConfig = {
                    type: 'line',
                    options: {
                        responsive: true,
                        maintainAspectRatio: true,
                        plugins: {
                            legend: {
                                display: false
                            }
                        },
                        scales: {
                            y: {
                                beginAtZero: false
                            }
                        }
                    }
                };

                // Speed Chart
                const speedCtx = byId('speed-chart');
                if (speedCtx) {
                    new Chart(speedCtx, {
                        ...chartConfig,
                        data: {
                            labels: labels,
                            datasets: [{
                                label: 'Avg Speed (km/h)',
                                data: speedData,
                                borderColor: '#007bff',
                                backgroundColor: 'rgba(0, 123, 255, 0.1)',
                                tension: 0.3,
                                fill: true
                            }]
                        }
                    });
                }

                // Duration Chart
                const durationCtx = byId('duration-chart');
                if (durationCtx) {
                    new Chart(durationCtx, {
                        ...chartConfig,
                        data: {
                            labels: labels,
                            datasets: [{
                                label: 'Duration (min)',
                                data: durationData,
                                borderColor: '#28a745',
                                backgroundColor: 'rgba(40, 167, 69, 0.1)',
                                tension: 0.3,
                                fill: true
                            }]
                        }
                    });
                }

                // Heart Rate Chart (if data available)
                const heartrateCtx = byId('heartrate-chart');
                if (heartrateCtx && heartrateData.some(v => v !== null)) {
                    new Chart(heartrateCtx, {
                        ...chartConfig,
                        data: {
                            labels: labels,
                            datasets: [{
                                label: 'Avg Heart Rate (bpm)',
                                data: heartrateData,
                                borderColor: '#dc3545',
                                backgroundColor: 'rgba(220, 53, 69, 0.1)',
                                tension: 0.3,
                                fill: true,
                                spanGaps: true
                            }]
                        }
                    });
                } else if (heartrateCtx) {
                    heartrateCtx.parentElement.innerHTML = '<p class="text-muted text-center">No heart rate data available</p>';
                }

                // Power Chart (if data available)
                const powerCtx = byId('power-chart');
                if (powerCtx && powerData.some(v => v !== null)) {
                    new Chart(powerCtx, {
                        ...chartConfig,
                        data: {
                            labels: labels,
                            datasets: [{
                                label: 'Avg Power (watts)',
                                data: powerData,
                                borderColor: '#ffc107',
                                backgroundColor: 'rgba(255, 193, 7, 0.1)',
                                tension: 0.3,
                                fill: true,
                                spanGaps: true
                            }]
                        }
                    });
                } else if (powerCtx) {
                    powerCtx.parentElement.innerHTML = '<p class="text-muted text-center">No power data available</p>';
                }
            }

            // Sort state for the two sortable tables
            const usesSort = { key: 'date', dir: -1 };   // default: newest first
            const historySort = { key: 'name', dir: 1 };

            function sortIcon(state, key) {
                if (state.key !== key) return ' <span style="opacity:0.35;font-size:10px;">↕</span>';
                return state.dir === 1
                    ? ' <span style="font-size:10px;">↑</span>'
                    : ' <span style="font-size:10px;">↓</span>';
            }

            function thStyle(state, key) {
                return `cursor:pointer; user-select:none;${state.key === key ? ' color:var(--bs-primary,#0d6efd);' : ''}`;
            }

            function renderUsesTable(route) {
                const container = byId('uses-table-container');
                if (!container) return;

                const rows = (route.activity_ids || []).map((aid, i) => ({
                    aid,
                    name: (route.activity_names && route.activity_names[i]) ? route.activity_names[i] : (route.name || String(aid)),
                    rawDate: (route.activity_dates && route.activity_dates[i]) || '',
                    isPrimary: aid === Number(route.id) || String(aid) === String(route.id),
                }));

                rows.sort((a, b) => {
                    if (usesSort.key === 'name') return usesSort.dir * a.name.localeCompare(b.name);
                    return usesSort.dir * (a.rawDate < b.rawDate ? -1 : a.rawDate > b.rawDate ? 1 : 0);
                });

                container.innerHTML = `<table class="table table-sm align-middle mb-0">
                    <thead><tr>
                        <th scope="col" data-sort="name" style="${thStyle(usesSort, 'name')}">Activity${sortIcon(usesSort, 'name')}</th>
                        <th scope="col" data-sort="date" style="${thStyle(usesSort, 'date')}">Date${sortIcon(usesSort, 'date')}</th>
                    </tr></thead>
                    <tbody>${rows.map(r => {
                        const dateStr = r.rawDate
                            ? new Date(r.rawDate).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' })
                            : '';
                        const label = r.isPrimary ? ' ★' : '';
                        return `<tr>
                            <td><a href="https://www.strava.com/activities/${r.aid}" target="_blank" rel="noopener">${escapeHtml(r.name)}${label}</a></td>
                            <td>${dateStr}</td>
                        </tr>`;
                    }).join('')}</tbody>
                </table>`;

                container.querySelectorAll('th[data-sort]').forEach(th => {
                    th.addEventListener('click', () => {
                        const key = th.dataset.sort;
                        if (usesSort.key === key) usesSort.dir *= -1;
                        else { usesSort.key = key; usesSort.dir = 1; }
                        renderUsesTable(route);
                    });
                });
            }

            function renderHistoryTable(route) {
                const container = byId('history-table-container');
                if (!container) return;

                const rows = (route.routes || []).slice(0, 20).map(item => ({
                    name: item.activity_name || route.name || String(item.activity_id || ''),
                    aid: item.activity_id || null,
                    rawDate: item.timestamp || '',
                    distance: item.distance,
                    duration: item.duration,
                    elevation: item.elevation,
                }));

                rows.sort((a, b) => {
                    if (historySort.key === 'date') return historySort.dir * (a.rawDate < b.rawDate ? -1 : a.rawDate > b.rawDate ? 1 : 0);
                    return historySort.dir * a.name.localeCompare(b.name);
                });

                container.innerHTML = `<table class="table table-sm align-middle mb-0">
                    <thead><tr>
                        <th scope="col" data-sort="name" style="${thStyle(historySort, 'name')}">Activity${sortIcon(historySort, 'name')}</th>
                        <th scope="col" data-sort="date" style="${thStyle(historySort, 'date')}">Date${sortIcon(historySort, 'date')}</th>
                        <th scope="col">Distance</th>
                        <th scope="col">Duration</th>
                        <th scope="col">Elevation</th>
                    </tr></thead>
                    <tbody>${rows.map(r => {
                        const dateStr = r.rawDate
                            ? new Date(r.rawDate).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' })
                            : '';
                        const actCell = r.aid
                            ? `<a href="https://www.strava.com/activities/${r.aid}" target="_blank" rel="noopener">${escapeHtml(r.name)}</a>`
                            : escapeHtml(r.name);
                        return `<tr>
                            <td>${actCell}</td>
                            <td>${dateStr}</td>
                            <td>${window.formatDistance(r.distance)}</td>
                            <td>${formatDuration(r.duration)}</td>
                            <td>${window.formatElevation(r.elevation)}</td>
                        </tr>`;
                    }).join('')}</tbody>
                </table>`;

                container.querySelectorAll('th[data-sort]').forEach(th => {
                    th.addEventListener('click', () => {
                        const key = th.dataset.sort;
                        if (historySort.key === key) historySort.dir *= -1;
                        else { historySort.key = key; historySort.dir = 1; }
                        renderHistoryTable(route);
                    });
                });
            }

            function renderRoute(route) {
                document.title = `${route.name} - Route Details`;

                const weatherMarkup = route.weather
                    ? `
                        <hr class="my-2">
                        <h3 class="h6 text-muted mb-2">Weather at ride time</h3>
                        <div class="row g-2">
                            ${route.weather.temp_c != null ? `
                                <div class="col-6">
                                    <div class="d-flex align-items-center gap-2">
                                        <i class="bi bi-thermometer-half" style="color: var(--accent);" aria-hidden="true"></i>
                                        <div>
                                            <div class="small text-muted">Temperature</div>
                                            <div class="fw-semibold">${window.formatTemperature(route.weather.temp_c)}</div>
                                        </div>
                                    </div>
                                </div>
                            ` : ''}
                            ${route.weather.wind_speed_kph != null ? `
                                <div class="col-6">
                                    <div class="d-flex align-items-center gap-2">
                                        <i class="bi bi-wind" style="color: var(--accent);" aria-hidden="true"></i>
                                        <div>
                                            <div class="small text-muted">Wind</div>
                                            <div class="fw-semibold">${window.formatSpeed(route.weather.wind_speed_kph)}${route.weather.wind_direction_cardinal ? ` ${route.weather.wind_direction_cardinal}` : ''}</div>
                                        </div>
                                    </div>
                                </div>
                            ` : ''}
                            ${route.weather.precipitation_mm != null ? `
                                <div class="col-6">
                                    <div class="d-flex align-items-center gap-2">
                                        <i class="bi bi-cloud-rain" style="color: var(--accent);" aria-hidden="true"></i>
                                        <div>
                                            <div class="small text-muted">Precipitation</div>
                                            <div class="fw-semibold">${route.weather.precipitation_mm} mm</div>
                                        </div>
                                    </div>
                                </div>
                            ` : ''}
                            ${route.weather.conditions ? `
                                <div class="col-6">
                                    <div class="d-flex align-items-center gap-2">
                                        <i class="bi bi-cloud-sun" style="color: var(--ink-soft);" aria-hidden="true"></i>
                                        <div>
                                            <div class="small text-muted">Conditions</div>
                                            <div class="fw-semibold">${route.weather.conditions}</div>
                                        </div>
                                    </div>
                                </div>
                            ` : ''}
                        </div>
                    `
                    : '';

                // #371a: Uses is a popularity/social signal — demote it out of the primary
                // metrics grid. Backfill the freed slot with avg speed (derivable from the
                // distance/duration already in the API response) when possible; otherwise
                // fall back to a 3-up grid rather than showing a placeholder value.
                const avgSpeedKmh = (route.distance > 0 && route.duration > 0)
                    ? route.distance / (route.duration / 60)
                    : null;

                // Long rides store uses as parallel arrays: activity_ids + activity_dates
                const longRideUsesMarkup = route.type === 'long_ride' && Array.isArray(route.activity_ids) && route.activity_ids.length > 1
                    ? `<div class="card mt-4">
                            <div class="card-body">
                                <h2 class="h5">All rides on this route (${route.activity_ids.length})</h2>
                                <div class="table-responsive" id="uses-table-container"></div>
                            </div>
                        </div>`
                    : '';

                const routeHistoryMarkup = Array.isArray(route.routes) && route.routes.length
                    ? `<div class="card mt-4">
                            <div class="card-body">
                                <h2 class="h5">Recent route records</h2>
                                <div class="table-responsive" id="history-table-container"></div>
                            </div>
                        </div>`
                    : '';

                byId('route-details').innerHTML = `
                    <section aria-labelledby="route-title">
                        <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-start gap-3 mb-3">
                            <div>
                                <h1 id="route-title" class="mb-2">${escapeHtml(route.name)}</h1>
                                <div>
                                    <span class="detail-chip"><i class="bi bi-signpost-split"></i> ${route.type || 'route'}</span>
                                    ${route.direction ? `<span class="detail-chip"><i class="bi bi-arrow-left-right"></i> ${route.direction}</span>` : ''}
                                    ${route.sport_type ? `<span class="detail-chip"><i class="bi bi-bicycle"></i> ${route.sport_type}</span>` : ''}
                                    ${route.difficulty ? `<span class="detail-chip"><i class="bi bi-bar-chart"></i> ${route.difficulty}</span>` : ''}
                                    ${route.is_favorite ? `<span class="detail-chip"><i class="bi bi-star-fill text-warning"></i> Favorite</span>` : ''}
                                    <span class="detail-chip detail-chip-muted"><i class="bi bi-arrow-repeat" aria-hidden="true"></i> ${route.uses || 0} use${route.uses === 1 ? '' : 's'}</span>
                                </div>
                            </div>
                            <div class="text-md-end d-flex flex-column align-items-md-end gap-1">
                                ${route.is_plus_route ? '<div class="text-muted">PLUS route</div>' : ''}
                                <div class="d-flex gap-2 flex-wrap justify-content-md-end">
                                    <button class="btn btn-sm btn-cta" id="save-plan-btn" title="Save this route as a plan to ride again">
                                        <i class="bi bi-calendar-plus"></i> Ride Again
                                    </button>
                                    ${route.type === 'long_ride' && route.id
                                        ? `<a href="https://www.strava.com/activities/${route.id}" target="_blank" rel="noopener" class="btn btn-sm btn-outline-warning"><i class="bi bi-box-arrow-up-right"></i> View on Strava</a>`
                                        : (Array.isArray(route.routes) && route.routes.length && route.routes[0].activity_id
                                            ? `<a href="https://www.strava.com/activities/${route.routes[0].activity_id}" target="_blank" rel="noopener" class="btn btn-sm btn-outline-warning"><i class="bi bi-box-arrow-up-right"></i> View on Strava</a>`
                                            : '')}
                                </div>
                            </div>
                        </div>

                        <div class="row g-3">
                            <div class="col-lg-7">
                                <div class="card">
                                    <div class="card-body">
                                        <div class="row g-2 mb-3">
                                            <div class="col-6 col-md-4">
                                                <div class="d-flex align-items-center gap-2">
                                                    <i class="bi bi-rulers text-primary"></i>
                                                    <div>
                                                        <div class="small text-muted">Distance</div>
                                                        <div class="fw-semibold tabular-nums">${window.formatDistance(route.distance)}</div>
                                                    </div>
                                                </div>
                                            </div>
                                            <div class="col-6 col-md-4">
                                                <div class="d-flex align-items-center gap-2">
                                                    <i class="bi bi-clock" style="color: var(--accent);" aria-hidden="true"></i>
                                                    <div>
                                                        <div class="small text-muted">Duration</div>
                                                        <div class="fw-semibold tabular-nums">${formatDuration(route.duration)}</div>
                                                    </div>
                                                </div>
                                            </div>
                                            <div class="col-6 col-md-4">
                                                <div class="d-flex align-items-center gap-2">
                                                    <i class="bi bi-graph-up-arrow text-success"></i>
                                                    <div>
                                                        <div class="small text-muted">Elevation</div>
                                                        <div class="fw-semibold tabular-nums">${window.formatElevation(route.elevation)}</div>
                                                    </div>
                                                </div>
                                            </div>
                                            ${avgSpeedKmh != null ? `
                                                <div class="col-6 col-md-4">
                                                    <div class="d-flex align-items-center gap-2">
                                                        <i class="bi bi-speedometer2 text-primary"></i>
                                                        <div>
                                                            <div class="small text-muted">Avg Speed</div>
                                                            <div class="fw-semibold tabular-nums">${window.formatSpeed(avgSpeedKmh)}</div>
                                                        </div>
                                                    </div>
                                                </div>
                                            ` : ''}
                                        </div>
                                        ${weatherMarkup}
                                    </div>
                                </div>

                                <!-- Performance Metrics Charts (#371b: moved into stats column, above history/uses) -->
                                <div class="card mt-3" id="performance-metrics-card">
                                    <div class="card-body">
                                        <h2 id="performance" class="h5 mb-4">
                                            <i class="bi bi-graph-up" aria-hidden="true"></i> Performance Trends
                                        </h2>
                                        <div id="performance-content"></div>
                                    </div>
                                </div>

                                ${routeHistoryMarkup}
                                ${longRideUsesMarkup}
                            </div>
                            <div class="col-lg-5">
                                <div style="position: sticky; top: var(--space-3);">
                                    <div class="card">
                                        <div class="card-body p-0">
                                            <div id="route-map" aria-label="Interactive route map"></div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>
                `;

                // Render map and detail content immediately
                if (Array.isArray(route.coordinates) && route.coordinates.length > 1) {
                    renderMap(route.coordinates);
                } else {
                    const mapEl = byId('route-map');
                    if (mapEl) {
                        mapEl.outerHTML = '<div class="alert alert-warning mt-2 mb-0">Map unavailable for this route.</div>';
                    }
                }

                renderUsesTable(route);
                renderHistoryTable(route);
                renderPerformanceCharts(route);

                announce(`Loaded route details for ${route.name}`);

                const savePlanBtn = byId('save-plan-btn');
                if (savePlanBtn) {
                    savePlanBtn.addEventListener('click', async () => {
                        savePlanBtn.disabled = true;
                        savePlanBtn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Saving…';
                        try {
                            await window.apiClient.savePlan({
                                route_id: route.id,
                                route_name: route.name,
                                route_type: route.type,
                                distance: route.distance,
                                duration: route.duration,
                                elevation: route.elevation,
                            });
                            savePlanBtn.innerHTML = '<i class="bi bi-check-lg"></i> Saved';
                            savePlanBtn.classList.replace('btn-cta', 'btn-success');
                            announce('Plan saved');
                        } catch (err) {
                            savePlanBtn.disabled = false;
                            savePlanBtn.innerHTML = '<i class="bi bi-calendar-plus"></i> Ride Again';
                            announce('Failed to save plan');
                        }
                    });
                }
            }

            async function loadRouteDetails() {
                const params = getRouteParams();

                if (!params.id) {
                    renderError('No route ID specified.', 'danger');
                    return;
                }

                try {
                    const response = await window.apiClient.getRouteDetails(params.id, params.type);
                    if (!response || response.status !== 'success' || !response.route) {
                        renderError('Route not found.', 'warning');
                        return;
                    }

                    renderRoute(response.route);
                } catch (error) {
                    if (String(error.message || '').includes('404')) {
                        renderError('Route not found.', 'warning');
                        return;
                    }

                    console.error('Failed to load route details:', error);
                    renderError('Failed to load route details. Please try again later.', 'danger');
                }
            }

            document.addEventListener('DOMContentLoaded', loadRouteDetails);
        })();
    </script>
</body>
</html>
